name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - master  # Runs every time you push to the master branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: SSH and Deploy to Hostinger
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_SSH_IP }}
        username: ${{ secrets.HOSTINGER_SSH_USER }}
        password: ${{ secrets.HOSTINGER_SSH_PASS }}
        port: ${{ secrets.HOSTINGER_SSH_PORT }}
        script: |
          # 1. Navigate to the project directory on Hostinger using the secret path
          cd ${{ secrets.HOSTINGER_PROJECT_PATH }}
          
          # 2. Pull the latest code from your GitHub master branch
          git pull origin master
          
          # 3. Install production dependencies
          npm install --no-audit --no-fund
          
          # 4. Generate Prisma database clients
          npx prisma generate
          
          # 5. Run database migrations to keep the database up to date
          npx prisma db push
          
          # 6. Build the Next.js project
          npm run build
          
          # 7. Restart the Node.js process on Hostinger
          mkdir -p tmp
          touch tmp/restart.txt
